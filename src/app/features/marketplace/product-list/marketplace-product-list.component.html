<section class="market-section">
  <h1>Marketplace Products</h1>
  <app-search-filter-bar (searchChange)="search($event)" />
  <div class="product-grid">
    @for (product of visibleProducts(); track product['id']) {
      <article class="product-card">
        <img [src]="text(product, 'image')" alt="Mobile phone listing" />
        <div>
          <h2>{{ text(product, 'brand') }} {{ text(product, 'model') }}</h2>
          <strong>{{ money(product, 'expectedSalePrice') | currency: 'PKR ' }}</strong>
          <p>{{ text(product, 'city') }} · {{ text(product, 'shopName') }}</p>
          <div class="badge-row">
            <app-status-badge [status]="status(product, 'condition')" />
            <app-status-badge [status]="status(product, 'ptaStatus')" />
          </div>
          <a mat-stroked-button color="primary" [routerLink]="['/marketplace/products', product['id']]">View details</a>
        </div>
      </article>
    }
  </div>
</section>
