<h2 mat-dialog-title>{{ data.title }}</h2>
<mat-dialog-content>
  <p>{{ data.message }}</p>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="close(false)">{{ data.cancelLabel ?? 'Cancel' }}</button>
  <button mat-flat-button color="warn" type="button" (click)="close(true)">{{ data.confirmLabel ?? 'Confirm' }}</button>
</mat-dialog-actions>
