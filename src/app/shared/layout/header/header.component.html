<mat-toolbar color="primary" class="header-toolbar">
  <div class="container-fluid">
    <div class="d-flex align-items-center w-100">
      <!-- Left Section -->
      <div class="brand-section d-flex align-items-center">
        <button mat-icon-button (click)="onMenuToggle()" class="me-3">
          <mat-icon>menu</mat-icon>
        </button>
        <span class="brand-text fw-bold">Enterprise App</span>
      </div>

      <!-- Right Section -->
      <div class="ms-auto d-flex align-items-center gap-3">
        <!-- Theme Toggle -->
        <button mat-icon-button (click)="toggleTheme()" 
                [matTooltip]="(currentTheme$ | async)?.name === 'light' ? 'Switch to dark mode' : 'Switch to light mode'">
          <mat-icon>
            {{ (currentTheme$ | async)?.name === 'light' ? 'dark_mode' : 'light_mode' }}
          </mat-icon>
        </button>

        <!-- User Menu -->
        <button mat-button [matMenuTriggerFor]="userMenu" class="user-menu-btn d-flex align-items-center gap-2">
          <mat-icon>account_circle</mat-icon>
          <span class="d-none d-sm-inline">
            {{ (currentUser$ | async)?.firstName }}
          </span>
        </button>
        
        <mat-menu #userMenu="matMenu">
          <button mat-menu-item (click)="navigateToProfile()">
            <mat-icon>person</mat-icon>
            <span>Profile</span>
          </button>
          <button mat-menu-item>
            <mat-icon>settings</mat-icon>
            <span>Settings</span>
          </button>
          <mat-divider></mat-divider>
          <button mat-menu-item (click)="logout()">
            <mat-icon>logout</mat-icon>
            <span>Logout</span>
          </button>
        </mat-menu>
      </div>
    </div>
  </div>
</mat-toolbar>
